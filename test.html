<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D Design Project Manager</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#EDF2F7;--srf:#fff;--srf2:#F7FAFC;
  --acc:#0098A8;--accL:#E6F7F9;--accT:#00626E;
  --bdr:#E2E8F0;--bdr2:#CBD5E0;
  --t1:#1A202C;--t2:#4A5568;--t3:#718096;--t4:#A0AEC0;
  --red:#E53E3E;--redL:#FFF5F5;
  --grn:#38A169;--grnL:#F0FFF4;
  --amb:#D69E2E;--ambL:#FFFBEB;
}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;height:100vh;display:flex;flex-direction:column;color:var(--t1);overflow:hidden}
#root{flex:1;display:flex;flex-direction:column;overflow:hidden;max-width:1100px;width:100%;margin:0 auto;border-left:1px solid var(--bdr);border-right:1px solid var(--bdr)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--t4)}

/* Top bar */
.topbar{height:48px;background:var(--srf);border-bottom:1px solid var(--bdr);display:flex;align-items:stretch;flex-shrink:0;position:relative;z-index:10}
.metric{display:flex;align-items:center;gap:6px;padding:0 18px;border-right:1px solid var(--bdr);font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;white-space:nowrap;user-select:none}
.metric .n{color:var(--t1);font-weight:800;font-size:14px;letter-spacing:0}
.tbr{display:flex;align-items:center;gap:8px;padding:0 14px;margin-left:auto}

/* Body */
.body{flex:1;display:flex;overflow:hidden}

/* Left */
.left{flex:1;overflow-y:auto;padding:20px 20px 14px;min-width:0;background:var(--bg)}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sh-l{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--t3);text-transform:uppercase;white-space:nowrap}
.sh-line{flex:1;height:1px;background:var(--bdr)}

/* Cards */
.card{background:var(--srf);border:1px solid var(--bdr);border-radius:10px;cursor:pointer;transition:border-color .12s,background .1s;position:relative;user-select:none;box-sizing:border-box;flex-shrink:0}
.card:hover{border-color:var(--bdr2);background:var(--srf2)}
.card.sel{border-color:var(--acc)!important;background:var(--accL)!important}
.card.over{border-color:var(--acc)!important;background:var(--accL)!important}
.card.dim{opacity:.18}.card.grab{cursor:grab}.card.grab:active{cursor:grabbing}
.card.ctr{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:10px;gap:3px}
.card-acts{display:none;position:absolute;top:6px;right:6px;gap:3px;align-items:center}
.card:hover .card-acts{display:flex}
.cbadge{position:absolute;top:8px;right:8px;background:var(--accL);color:var(--accT);border:1px solid rgba(0,152,168,.2);font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;pointer-events:none;line-height:1.4}
.card:hover .cbadge{display:none}
.newcard{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px;flex-shrink:0;border-radius:10px;cursor:pointer;border:1.5px dashed var(--bdr2);text-align:center;transition:all .12s;user-select:none;box-sizing:border-box}
.newcard:hover,.newcard.over{border-color:var(--acc);background:var(--accL);color:var(--accT)}

/* Buttons */
.btn-p{background:var(--acc);color:#fff;border:none;border-radius:100px;padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;line-height:1;white-space:nowrap;font-family:inherit;transition:opacity .1s}
.btn-p:hover{opacity:.88}
.btn-s{background:var(--srf);color:var(--t2);border:1px solid var(--bdr);border-radius:7px;padding:6px 13px;font-size:11px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;line-height:1;white-space:nowrap;font-family:inherit;transition:background .1s}
.btn-s:hover{background:var(--srf2)}.btn-s:disabled{opacity:.4;cursor:not-allowed}
.btn-d{background:transparent;color:var(--accT);border:1.5px dashed var(--acc);border-radius:8px;padding:10px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;width:100%;font-family:inherit;transition:background .12s}
.btn-d:hover{background:var(--accL)}.btn-d:disabled{opacity:.3;cursor:not-allowed;border-color:var(--bdr2);color:var(--t4)}
.btn-danger{background:var(--redL);color:var(--red);border:1px solid #FEB2B2;border-radius:7px;padding:6px 14px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit}
.cib{width:22px;height:22px;border-radius:50%;border:1px solid var(--bdr);background:var(--srf);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;padding:0;line-height:1;transition:all .1s;flex-shrink:0}
.cib:hover{color:var(--t1);border-color:var(--bdr2);background:var(--srf2)}
.cib.del:hover{color:var(--red);border-color:#FEB2B2;background:var(--redL)}
.cib.on{background:var(--accL);color:var(--accT);border-color:var(--acc)}

/* Inputs */
input,select{background:var(--srf);border:1px solid var(--bdr);border-radius:7px;color:var(--t1);font-size:12px;padding:7px 10px;font-family:inherit;width:100%;box-sizing:border-box;transition:border-color .1s}
input:focus,select:focus{outline:none;border-color:var(--acc)}
.det-inp{border:none;border-radius:0;padding:0;font-size:12px;border-bottom:1px solid transparent;background:transparent;width:100%}
.det-inp:focus{outline:none;border-bottom-color:var(--acc)}
.mdinput{flex:1;width:100%;resize:none;border:none;background:transparent;color:var(--t1);font-family:'SF Mono',Monaco,Consolas,monospace;font-size:11px;line-height:1.7;padding:14px 18px;box-sizing:border-box}
.mdinput:focus{outline:none}

/* Right panel */
.right{width:260px;background:var(--srf);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.insp-head{height:40px;display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--bdr);gap:8px;flex-shrink:0;background:var(--srf2)}
.tabs{display:flex;border-bottom:1px solid var(--bdr);flex-shrink:0;height:36px;align-items:stretch;background:var(--srf)}
.tab{flex:1;border:none;background:transparent;color:var(--t3);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:color .1s,border-color .1s}
.tab:hover{color:var(--t1)}.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.notes-path{padding:7px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:7px;flex-shrink:0;background:var(--srf2)}

/* File tree */
.ft-r{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:7px;cursor:pointer;transition:background .08s;user-select:none;min-width:0}
.ft-r:hover{background:var(--srf2)}.ft-r.fsel{background:var(--accL)}.ft-r.isel{background:var(--accL)}

/* Search */
.srch{display:flex;align-items:center;gap:7px;border:1px solid var(--bdr);border-radius:8px;padding:0 10px;background:var(--srf)}
.srch input{border:none;background:transparent;font-size:12px;padding:7px 0;font-family:inherit;width:100%;color:var(--t1)}
.srch input::placeholder{color:var(--t4)}
.srch input:focus{outline:none}

/* Filter chips */
.fchip{padding:4px 13px;border-radius:100px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--bdr);background:var(--srf);color:var(--t3);font-family:inherit;line-height:1.5;transition:all .1s}
.fchip:hover{border-color:var(--bdr2);color:var(--t2)}.fchip.on{border-color:var(--acc);color:var(--accT);background:var(--accL)}

/* Details */
.det-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bdr)}
.det-key{font-size:10px;color:var(--t3);width:76px;flex-shrink:0;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.det-sec-l{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--t3);text-transform:uppercase;display:block;margin-bottom:10px}

/* Material pill */
.mat-pill{display:inline-block;padding:2px 7px;border-radius:100px;font-size:8px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;line-height:1.5}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(26,32,44,.28);display:flex;align-items:center;justify-content:center;z-index:100}
.mbox{background:var(--srf);border-radius:14px;padding:24px 26px;width:320px;box-sizing:border-box;max-height:90vh;overflow-y:auto}
.mfield{margin-bottom:14px}
.ml{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.pblock{background:var(--srf2);border:1px solid var(--bdr);border-radius:8px;padding:11px 14px;margin-bottom:12px}

/* Context menu */
.ctx{position:fixed;background:var(--srf);border:1px solid var(--bdr);border-radius:10px;padding:5px;min-width:174px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.ctx-i{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--t1);transition:background .08s}
.ctx-i:hover{background:var(--srf2)}.ctx-i.warn{color:var(--red)}
.ctx-sep{height:1px;background:var(--bdr);margin:4px 8px}

/* Status bar */
.sbar{height:42px;background:var(--srf);border-top:1px solid var(--bdr);display:flex;align-items:center;padding:0 18px;gap:14px;flex-shrink:0}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pb-bg{height:4px;border-radius:2px;background:var(--bdr);max-width:90px;flex:1}
.pb-fill{height:4px;border-radius:2px;background:var(--acc);transition:width .3s}

/* Toast */
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:300;background:var(--t1);color:#fff;font-size:11px;padding:9px 20px;border-radius:100px;white-space:nowrap;display:flex;align-items:center;gap:7px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.15)}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;flex:1;padding:32px;text-align:center;color:var(--t4)}
.divider{width:1px;height:16px;background:var(--bdr);flex-shrink:0;margin:0 2px}
.pro-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(126px,1fr));gap:8px;margin-bottom:10px;max-height:260px;overflow-y:auto;padding:2px}
.pro-card{background:var(--srf);border:1.5px solid var(--bdr);border-radius:8px;padding:10px 11px;cursor:pointer;transition:all .12s;position:relative;min-width:0}
.pro-card:hover{border-color:var(--bdr2);background:var(--srf2)}
.pro-card.pro-sel{border-color:var(--acc);background:var(--accL)}
.pro-card-acts{display:none;position:absolute;top:5px;right:5px;gap:3px;align-items:center}
.pro-card:hover .pro-card-acts{display:flex}
.pro-new{background:transparent;border:1.5px dashed var(--bdr2);border-radius:8px;padding:10px 11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all .12s;min-height:76px;font-family:inherit}
.pro-new:hover{border-color:var(--acc);background:var(--accL);color:var(--accT)}
.mbox-wide{background:var(--srf);border-radius:14px;padding:24px 26px;width:480px;box-sizing:border-box;max-height:90vh;overflow-y:auto}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useRef}=React;
const h=React.createElement;

/* ── Printer states ── */
const PS=[
  {label:"Ready",connected:true,dot:"#38A169",hotend:{c:27,t:0},bed:{c:24,t:0},printing:null},
  {label:"Heating",connected:true,dot:"#D69E2E",hotend:{c:142,t:215},bed:{c:38,t:60},printing:null},
  {label:"Printing",connected:true,dot:"#0098A8",hotend:{c:215,t:215},bed:{c:60,t:60},printing:{file:"bracket_v1.1.gcode",pct:47}},
  {label:"Offline",connected:false,dot:"#E53E3E",hotend:{c:22,t:0},bed:{c:22,t:0},printing:null},
];

/* ── Material colours ── */
const MC={PLA:{bg:"#DBEAFE",c:"#1D4ED8"},PETG:{bg:"#D1FAE5",c:"#065F46"},ASA:{bg:"#FEF3C7",c:"#92400E"},ABS:{bg:"#FCE7F3",c:"#9D174D"},TPU:{bg:"#EDE9FE",c:"#5B21B6"},Nylon:{bg:"#F0F9FF",c:"#0369A1"}};
const ms=m=>MC[m]||{bg:"#F7FAFC",c:"#718096"};

/* ── File icons / colours ── */
const FI={stl:"ti-box","3mf":"ti-box",gcode:"ti-code"};
const FC={stl:"#D97706","3mf":"#2563EB",gcode:"#059669"};
const MATS=["PLA","PETG","ASA","ABS","TPU","Nylon","PC","PA-CF"];

/* ── Seed data ── */
const INIT=[
  {id:"p1",name:"Shelf Bracket System",desc:"Parametric 80/20 extrusion bracket",created:"2026-04-10",
   md:"# Shelf Bracket System\n\nParametric bracket for 80×40mm extrusion rail mounting.\n\n## Objective\n\nModular bracket supporting ≥10kg static load, no-support print.\n\n## Notes\n\n- Material: PETG or ASA\n- Hardware: M5 bolts\n- Test: graduated static weights",
   iters:[
    {id:"i1",ver:"1.0",label:"Initial Design",date:"2026-04-10",meta:{material:"PETG",color:"Natural",weight:"12g"},
     files:[{name:"bracket_v1.stl",type:"stl",size:"2.4 MB"},{name:"bracket_v1.3mf",type:"3mf",size:"1.1 MB"}],
     md:"# v1.0 — Initial Design\n\n**Date:** 2026-04-10\n\n## Changes\n\n- Created base bracket geometry\n- Added M5 mounting hole pattern\n- Exported STL + 3MF\n\n## Notes\n\nFirst draft. Passed 6kg static test."},
    {id:"i2",ver:"1.1",label:"Stress Relief Chamfer",date:"2026-04-14",meta:{material:"PETG",color:"Natural",weight:"14g"},
     files:[{name:"bracket_v1.1.stl",type:"stl",size:"2.6 MB"},{name:"bracket_v1.1.gcode",type:"gcode",size:"8.9 MB"}],
     md:"# v1.1 — Stress Relief Chamfer\n\n**Date:** 2026-04-14\n\n## Changes\n\n- Added 3mm chamfer to inner corner\n- Wall thickness: 2.4 → 3.2mm\n- Holes updated to M5 clearance\n\n## Notes\n\nv1.0 cracked under 8kg. Chamfer redistributes stress. Passed 10kg test."},
    {id:"i3",ver:"1.2",label:"Wide Mount Variant",date:"2026-05-01",meta:{material:"ASA",color:"Black",weight:"22g"},
     files:[{name:"bracket_wide_v1.2.stl",type:"stl",size:"3.1 MB"}],
     md:"# v1.2 — Wide Mount Variant\n\n**Date:** 2026-05-01\n\n## Changes\n\n- Widened flange: 40 → 80mm\n- Added second bolt row\n- Switched to ASA for UV resistance\n\n## Notes\n\nDouble-track 80/20 rail. Load test pending."},
   ]},
  {id:"p2",name:"Klipper Electronics Mount",desc:"RPi 4 + BTT Octopus enclosure",created:"2026-03-22",
   md:"# Klipper Electronics Mount\n\nRPi 4 + BTT Octopus v1.1 enclosure mount.\n\n## Notes\n\n- Verified vs BTT Octopus Rev 1.1\n- PETG minimum for thermal tolerance",
   iters:[
    {id:"i4",ver:"1.0",label:"Draft Layout",date:"2026-03-22",meta:{material:"PLA",color:"Grey",weight:"31g"},
     files:[{name:"elec_mount_draft.stl",type:"stl",size:"5.2 MB"}],
     md:"# v1.0 — Draft Layout\n\n**Date:** 2026-03-22\n\n## Changes\n\n- Initial geometry from RPi 4 drawing\n- Placeholder mounting holes\n\n## Notes\n\nNeeds hardware check before finalising."},
    {id:"i5",ver:"2.0",label:"Cable Management",date:"2026-04-05",meta:{material:"PETG",color:"Black",weight:"48g"},
     files:[{name:"elec_mount_v2.stl",type:"stl",size:"6.8 MB"},{name:"elec_mount_v2.3mf",type:"3mf",size:"3.4 MB"},{name:"elec_mount_v2.gcode",type:"gcode",size:"14.2 MB"}],
     md:"# v2.0 — Cable Management\n\n**Date:** 2026-04-05\n\n## Changes\n\n- Full redesign from scratch\n- 8mm cable routing channels\n- DIN rail clips integrated\n- Standoffs verified vs Rev 1.1"},
   ]},
  {id:"p3",name:"Filament Spool Holder",desc:"Wall-mounted dry box spool system",created:"2026-05-10",
   md:"# Filament Spool Holder\n\nWall-mounted dry box system for 1kg spools.\n\n## Notes\n\n- Bearing: 608ZZ press-fit\n- Wall anchor: M6 bolts",
   iters:[
    {id:"i6",ver:"1.0",label:"Single Spool Prototype",date:"2026-05-10",meta:{material:"PLA",color:"White",weight:"18g"},
     files:[{name:"spool_holder_v1.stl",type:"stl",size:"1.9 MB"}],
     md:"# v1.0 — Single Spool Prototype\n\n**Date:** 2026-05-10\n\n## Changes\n\n- Spool axle mount geometry\n- 608ZZ bearing slot (press-fit)\n- Wall anchor M6 — 4 points\n\n## Notes\n\nSingle spool to validate bearing friction before multi-spool variant."},
   ]},
];

/* ── Markdown helpers ── */
function parseBold(s){
  const parts=[];let r=s,k=0;
  while(r.includes("**")){
    const a=r.indexOf("**"),b=r.indexOf("**",a+2);
    if(b===-1){parts.push(r);r="";break;}
    if(a>0)parts.push(r.slice(0,a));
    parts.push(h("strong",{key:k++,style:{color:"var(--t1)"}},r.slice(a+2,b)));
    r=r.slice(b+2);
  }
  if(r)parts.push(r);
  return parts.length===0?"":parts.length===1&&typeof parts[0]==="string"?parts[0]:parts;
}
function renderMd(md){
  if(!md)return h("span",{style:{color:"var(--t4)",fontSize:12}},"No content — click ✎ to start writing.");
  return md.split("\n").map((ln,i)=>{
    if(ln.startsWith("# "))return h("div",{key:i,style:{fontSize:17,fontWeight:700,color:"var(--t1)",marginBottom:8,marginTop:i?6:0,lineHeight:1.3}},ln.slice(2));
    if(ln.startsWith("## "))return h("div",{key:i,style:{fontSize:9,fontWeight:700,color:"var(--t3)",marginTop:14,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.1em"}},ln.slice(3));
    if(ln.startsWith("- ")||ln.startsWith("— "))return h("div",{key:i,style:{display:"flex",gap:8,marginBottom:3}},
      h("span",{style:{color:"var(--t4)",flexShrink:0,lineHeight:1.7}},"—"),
      h("span",{style:{fontSize:12,color:"var(--t2)",lineHeight:1.7}},parseBold(ln.slice(2))));
    if(!ln.trim())return h("div",{key:i,style:{height:6}});
    return h("div",{key:i,style:{fontSize:12,color:"var(--t2)",lineHeight:1.7,marginBottom:2}},parseBold(ln));
  });
}
function fmtSz(files){return files.reduce((s,f)=>s+parseFloat(f.size),0).toFixed(1)+" MB";}

/* ── App ── */
function App(){
  const [projs,setProjs]=useState(INIT);
  const [pid,setPid]=useState("p1");
  const [iid,setIid]=useState("i2");
  const [tab,setTab]=useState("files");
  const [editMd,setEditMd]=useState(false);
  const [selFile,setSelFile]=useState(null);
  const [ff,setFf]=useState("all");
  const [fs,setFs]=useState("");
  const [search,setSearch]=useState("");
  const [searchOpen,setSearchOpen]=useState(false);
  const [drop,setDrop]=useState(null);
  const [dragId,setDragId]=useState(null);
  const [dragOv,setDragOv]=useState(null);
  const [dragPid,setDragPid]=useState(null);
  const [dragPOv,setDragPOv]=useState(null);
  const [modal,setModal]=useState(null);
  const [mv,setMv]=useState("");
  const [mv2,setMv2]=useState("");
  const [ctxMenu,setCtxMenu]=useState(null);
  const [pidx,setPidx]=useState(0);
  const [sett,setSett]=useState({name:"Voron 2.4",ip:"192.168.1.100",api:"Mainsail",path:"/Applications/OrcaSlicer.app"});
  const [profiles,setProfiles]=useState([
    {id:"pp1",name:"Draft 0.3mm",lh:"0.30",infill:"15",sup:"None",spd:"Draft",mat:"PLA",notes:"Quick test prints, non-critical parts"},
    {id:"pp2",name:"Standard 0.2mm",lh:"0.20",infill:"20",sup:"None",spd:"Normal",mat:"PETG",notes:"Everyday functional parts"},
    {id:"pp3",name:"Quality 0.15mm",lh:"0.15",infill:"30",sup:"Tree",spd:"Normal",mat:"PETG",notes:"Structural parts needing strong layer adhesion"},
    {id:"pp4",name:"Detail 0.1mm",lh:"0.10",infill:"40",sup:"Tree",spd:"Quality",mat:"PETG",notes:"Fine detail work, small features"},
  ]);
  const [selPro,setSelPro]=useState("pp2");
  const [mdata,setMdata]=useState({});
  const [toast,setToast]=useState(null);
  const tt=useRef();

  /* Computed */
  const selP=projs.find(p=>p.id===pid)||null;
