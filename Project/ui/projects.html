<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print Farm Manager</title>
  <link rel="stylesheet" href="assets/tabler-icons/tabler-icons.min.css"> <!-- Tabler icon font for UI icons -->
  <link rel="stylesheet" href="shared.css"> <!-- Shared styles used across all pages (variables, modals, toasts) -->
  <link rel="stylesheet" href="projects.css"> <!-- Projects page-specific styles (cards, canvas, sidebar, connections) -->
</head>
<body>
    <!-- Main page layout -->
    <div class="layout">

      <!-- Page header with project stats and action buttons -->
      <header class="page-header">

        <!-- Project summary statistics -->
        <div class="header-stats">
          <span><span class="header-stat-label">PROJECTS</span> <strong id="stat-projects">0</strong></span> <!-- Total number of projects -->
          <span><span class="header-stat-label">ITERATIONS</span> <strong id="stat-itterations">0</strong></span> <!-- Total number of revision nodes across all projects -->
          <span><span class="header-stat-label">FILES</span> <strong id="stat-files">0</strong></span> <!-- Total number of files attached to any revision -->
        </div>

        <!-- Header action area: search bar and new project button -->
        <div class="header-actions" id="project-actions">

          <!-- Expandable project search bar — toggled by the search icon button below -->
          <div class="header-search" id="project-search-ui">
            <div class="search-field" id="project-search-field">
              <i class="ti ti-search" aria-hidden="true"></i>
              <input type="text" id="project-search" placeholder="Search Projects..." oninput="setPrinterSearch(this.value)"> <!-- Filters the project grid as the user types -->
            </div>
            <button class="icon-button" type="button" id="project-search-close" title="Close">
              <i class="ti ti-x" aria-hidden="true"></i> <!-- Closes and clears the search bar -->
            </button>
          </div>

          <div class="header-message" id="header-message"></div> <!-- Reserved for status messages -->

          <!-- Add new project button -->
          <button class="button-primary" type="button" id="project-new" onclick="openProjectModal()">
            <i class="ti ti-plus" aria-hidden="true"></i>
            New Project
          </button>

          <!-- Search toggle button — expands the search bar when clicked -->
          <button class="icon-button search-toggle" type="button" id="project-search-open" title="Search">
            <i class="ti ti-search" aria-hidden="true"></i>
          </button>
        </div>
      </header>

      <!-- Main two-panel content area -->
      <div class="main">

        <!-- Left panel: Project cards grid -->
        <div class="printers-panel">
          <div class="panel-heading"><strong>PROJECTS</strong></div>
          <div class="printers-grid" id="printers-grid"></div> <!-- Dynamically populated with project cards by renderProjectGrid() -->
        </div>

        <!-- Right panel: Node detail sidebar — populated by renderSidebar() when a revision is selected -->
        <!-- SIDE PANEL-->
        <div id="proj-sidebar"></div>
      </div>
    </div>

  <!-- Shared toast notification bar -->
  <div class="toast" id="app-toast"></div>

  <!-- Add/Edit Project Modal — shown as a side-by-side pair with the AI Assistant panel -->
  <div class="modal-backdrop" id="printer-modal">
    <div class="modal-pair"> <!-- Wrapper that lays out the two modal panels side by side -->

      <!-- Main project form modal -->
      <!-- MAIN PROJECT MODAL -->
      <div class="modal">
        <div class="modal-title" id="printer-modal-title">NEW PROJECT</div> <!-- Title updated dynamically by openProjectModal() -->

        <!-- Project name and accent colour row -->
        <div class="form-group">
          <label class="form-label">Name</label>
          <div class="name-colour-row">
            <input type="text" class="form-input" id="p-name" placeholder="e.g. Amazing Kup"> <!-- Project name input -->
            <div class="colour-picker-wrap">
              <button class="colour-swatch" id="p-colour-swatch" type="button" onclick="toggleColourPicker()"> <!-- Opens the accent colour picker popover -->
                <span class="colour-dot" id="p-colour-dot"></span> <!-- Displays the currently selected accent colour -->
              </button>
              <div class="colour-popover" id="p-colour-popover"></div> <!-- Colour swatch grid, populated by buildColourPopover() -->
            </div>
          </div>
        </div>

        <!-- Project description -->
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-input form-description" id="p-description" placeholder="e.g. A Truly Incredible Kup"></textarea> <!-- Optional project description -->
        </div>

        <!-- Modal action buttons -->
        <div class="modal-actions">
          <button class="button-cancel" type="button" onclick="closeProjectModal()">Cancel</button> <!-- Closes without saving -->
          <button class="button-danger" type="button" id="printer-remove" onclick="removeProjectFromModal()">Remove</button> <!-- Deletes the project; only shown in edit mode -->
          <button class="button-confirm" type="button" id="printer-confirm" onclick="confirmProjectModal()">Add Project</button> <!-- Saves or updates the project; label updated by openProjectModal() -->
        </div>
      </div>

      <!-- AI Assistant panel — generates a project name and description from a plain-text description -->
      <!-- AI ASSISTANT PANEL -->
      <div class="ai-panel-wrap">
        <div class="modal ai-panel">
          <div class="modal-title">AI ASSISTANT</div>
          <div class="form-group ai-prompt-group">
            <label class="form-label">Describe what you're making</label>
            <textarea class="form-input form-textarea" id="ai-user-prompt"
              placeholder="e.g. A modular wall-mounted organiser for workshop tools with snap-fit clips"></textarea> <!-- Plain-text description passed to the AI to generate a project name and summary -->
          </div>
          <div class="ai-btn-wrap" id="ai-btn-wrap"> <!-- Wrapper that shows generating/ready/error CSS states -->
            <button class="button-ai" type="button" id="ai-generate-btn" onclick="generateWithAI()">
              <i class="ti ti-sparkles" aria-hidden="true"></i>
              Generate
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Add Revision Modal — shown as a side-by-side pair with the AI Assistant panel -->
  <!-- REVISION MODAL -->
  <div class="modal-backdrop" id="revision-modal">
    <div class="modal-pair">

      <!-- Revision form modal -->
      <!-- REVISION FORM -->
      <div class="modal">
        <div class="modal-title">NEW REVISION</div>
        <div class="form-group">
          <label class="form-label">Revision Name</label>
          <input type="text" class="form-input" id="r-name" placeholder="e.g. Capacity Upgrade"> <!-- Short name for this design iteration -->
        </div>
        <div class="form-group">
          <label class="form-label">Changes &amp; Improvements</label>
          <textarea class="form-input form-description" id="r-description" placeholder="e.g. Increased Kup Capacity"></textarea> <!-- Description of what changed in this revision -->
        </div>
        <div class="modal-actions">
          <button class="button-cancel" type="button" onclick="closeRevisionModal()">Cancel</button> <!-- Closes without saving -->
          <button class="button-confirm" type="button" onclick="confirmRevisionModal()">Add Revision</button> <!-- Creates the new revision node -->
        </div>
      </div>

      <!-- AI Assistant panel — generates a revision name and description from a plain-text changes description -->
      <!-- AI ASSISTANT PANEL -->
      <div class="ai-panel-wrap">
        <div class="modal ai-panel">
          <div class="modal-title">AI ASSISTANT</div>
          <div class="form-group ai-prompt-group">
            <label class="form-label">Describe the changes you made</label>
            <textarea class="form-input form-textarea" id="r-ai-prompt"
              placeholder="e.g. Switched to ASA, widened the flanges by 3mm, added two mounting tabs on the rear face"></textarea> <!-- Plain-text changes description passed to the AI to generate a revision name and summary -->
          </div>
          <div class="ai-btn-wrap" id="r-ai-btn-wrap"> <!-- Wrapper that shows generating/ready/error CSS states -->
            <button class="button-ai" type="button" id="r-ai-generate-btn" onclick="generateRevisionWithAI()">
              <i class="ti ti-sparkles" aria-hidden="true"></i>
              Generate
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

    <!-- Scripts loaded at the end of body so the DOM is ready when they execute -->
    <script src="shared.js"></script> <!-- Shared utilities: showToast, COLOURS -->
    <script src="projects.js"></script> <!-- Projects page logic: project grid, revision canvas, sidebar, modals -->
</body>
</html>
