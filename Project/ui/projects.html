<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print Farm Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="projects.css">
</head>
<body>
    <div class="layout">
    <header class="page-header">
      <div class="header-stats">
        <span><span class="header-stat-label">PROJECTS</span> <strong id="stat-projects">0</strong></span>
        <span><span class="header-stat-label">ITERATIONS</span> <strong id="stat-itterations">0</strong></span>
        <span><span class="header-stat-label">FILES</span> <strong id="stat-files">0</strong></span>
      </div>
      <div class="header-actions" id="project-actions">
        <div class="header-search" id="project-search-ui">
          <div class="search-field" id="project-search-field">
            <i class="ti ti-search" aria-hidden="true"></i>
            <input type="text" id="project-search" placeholder="Search Projects..." oninput="setPrinterSearch(this.value)">
          </div>
          <button class="icon-button" type="button" id="project-search-close" title="Close">
            <i class="ti ti-x" aria-hidden="true"></i>
          </button>
        </div>
        <div class="header-message" id="header-message"></div>
        <button class="button-primary" type="button" id="project-new" onclick="openProjectModal()">
          <i class="ti ti-plus" aria-hidden="true"></i>
          New Project
        </button>
        <button class="icon-button search-toggle" type="button" id="project-search-open" title="Search">
          <i class="ti ti-search" aria-hidden="true"></i>
        </button>
      </div>
    </header>
    <div class="main">
      <div class="printers-panel">
        <div class="panel-heading"><strong>PROJECTS</strong></div>
        <div class="printers-grid" id="printers-grid"></div>
      </div>

    <!-- SIDE PANEL-->
      <div class="documents-panel">
        <div class="documents-panel-header">
          <div class="panel-heading" style="margin-bottom:0;">Filament Inventory</div>
        </div>
        <div class="pool-zone" id="pool-zone"
          ondragover="onPoolDragOver(event)"
          ondragleave="onPoolDragLeave(event)"
          ondrop="onPoolDrop(event)">
        </div>
        <div class="panel-footer">
          <button class="add-filament-btn" id="add-filament-btn" onclick="openProjectModal()">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Filament Spool
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="ai-toast"></div>

  <div class="modal-backdrop" id="printer-modal">
    <div class="modal-pair">

      <!-- MAIN PROJECT MODAL -->
      <div class="modal">
        <div class="modal-title" id="printer-modal-title">NEW PROJECT</div>
        <div class="form-group">
          <label class="form-label">Name</label>
          <div class="name-colour-row">
            <input type="text" class="form-input" id="p-name" placeholder="e.g. Amazing Kup">
            <div class="colour-picker-wrap">
              <button class="colour-swatch" id="p-colour-swatch" type="button" onclick="toggleColourPicker()">
                <span class="colour-dot" id="p-colour-dot"></span>
              </button>
              <div class="colour-popover" id="p-colour-popover"></div>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-input form-description" id="p-description" placeholder="e.g. A Truly Incredible Kup"></textarea>
        </div>
        <div class="modal-actions">
          <button class="button-cancel" type="button" onclick="closeProjectModal()">Cancel</button>
          <button class="button-danger" type="button" id="printer-remove" onclick="removeProjectFromModal()">Remove</button>
          <button class="button-confirm" type="button" id="printer-confirm" onclick="confirmProjectModal()">Add Project</button>
        </div>
      </div>

      <!-- AI ASSISTANT PANEL -->
      <div class="ai-panel-wrap">
        <div class="modal ai-panel">
          <div class="modal-title">AI ASSISTANT</div>
          <div class="form-group ai-prompt-group">
            <label class="form-label">Describe what you're making</label>
            <textarea class="form-input form-textarea" id="ai-user-prompt"
              placeholder="e.g. A modular wall-mounted organiser for workshop tools with snap-fit clips"></textarea>
          </div>
          <div class="ai-btn-wrap" id="ai-btn-wrap">
            <button class="button-ai" type="button" id="ai-generate-btn" onclick="generateWithAI()">
              <i class="ti ti-sparkles" aria-hidden="true"></i>
              Generate
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
    
  <!-- REVISION MODAL -->
  <div class="modal-backdrop" id="revision-modal">
    <div class="modal-pair">

      <!-- REVISION FORM -->
      <div class="modal">
        <div class="modal-title">NEW REVISION</div>
        <div class="form-group">
          <label class="form-label">Revision Name</label>
          <input type="text" class="form-input" id="r-name" placeholder="e.g. Capacity Upgrade">
        </div>
        <div class="form-group">
          <label class="form-label">Changes &amp; Improvements</label>
          <textarea class="form-input form-description" id="r-description" placeholder="e.g. Increased Kup Capacity"></textarea>
        </div>
        <div class="modal-actions">
          <button class="button-cancel" type="button" onclick="closeRevisionModal()">Cancel</button>
          <button class="button-confirm" type="button" onclick="confirmRevisionModal()">Add Revision</button>
        </div>
      </div>

      <!-- AI ASSISTANT PANEL -->
      <div class="ai-panel-wrap">
        <div class="modal ai-panel">
          <div class="modal-title">AI ASSISTANT</div>
          <div class="form-group ai-prompt-group">
            <label class="form-label">Describe the changes you made</label>
            <textarea class="form-input form-textarea" id="r-ai-prompt"
              placeholder="e.g. Switched to ASA, widened the flanges by 3mm, added two mounting tabs on the rear face"></textarea>
          </div>
          <div class="ai-btn-wrap" id="r-ai-btn-wrap">
            <button class="button-ai" type="button" id="r-ai-generate-btn" onclick="generateRevisionWithAI()">
              <i class="ti ti-sparkles" aria-hidden="true"></i>
              Generate
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

    <script src="shared.js"></script>
    <script src="projects.js"></script>
</body>
</html>
