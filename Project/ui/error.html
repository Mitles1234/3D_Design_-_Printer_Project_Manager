<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Error</title>
		<link rel="stylesheet" href="style.css" />
		<style>
			body {
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				background: #f8fafc;
			}
			.error-box {
				background: #fff0f0;
				border: 1px solid #fca5a5;
				border-radius: 16px;
				padding: 48px 32px;
				box-shadow: 0 8px 32px rgba(220, 38, 38, 0.08);
				text-align: center;
			}
			.error-box h1 {
				color: #dc2626;
				font-size: 2.5rem;
				margin-bottom: 16px;
			}
			.error-box p {
				color: #991b1b;
				font-size: 1.2rem;
			}
		</style>
	</head>
	<body>
		<div class="error-box">
			<h1>Error</h1>
			<p>Sorry, something went wrong.<br>Please try again or contact support.</p>
		</div>
	</body>
</html>
