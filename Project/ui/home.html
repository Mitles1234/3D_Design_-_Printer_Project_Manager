<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="content-wrapper">
      <h1>Home</h1>
      <p>Welcome to the Printer Project Manager.</p>
      <section class="drop-panel">
        <div class="drop-zone" data-drop-zone>
          <input class="drop-input" data-file-input type="file" multiple />
          <div class="drop-copy">
            <h2>Drag and drop files</h2>
            <p>Or click to select files to stage for processing.</p>
          </div>
        </div>
        <p class="drop-status" data-drop-status></p>
    </div>
    <script src="home.js"></script>
  </body>
</html>
