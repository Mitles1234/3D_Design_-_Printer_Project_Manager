<!DOCTYPE html>
<html>
<body>

  <button onclick="callPython()">Click Me</button>
  <p id="result"></p>

  <iframe 
  src="http://192.168.0.170:4409" 
  width="100%" 
  height="500px"
  frameborder="0">
  </iframe>

  <script>
    async function callPython() {
      // Call the Python function — always returns a Promise
      const result = await window.pywebview.api.say_hello("Miles")
      document.getElementById("result").innerHTML = result
    }
  </script>

</body>
</html>
